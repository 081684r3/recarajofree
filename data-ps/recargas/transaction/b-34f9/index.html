<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cargando...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
    }
    .loader {
      text-align: center;
    }
    .loader img {
      width: 80px;
      height: 80px;
    }
    .loader p {
      color: #666;
      margin-top: 20px;
      font-size: 16px;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
    .loader img {
      animation: pulse 1.5s infinite;
    }
  </style>
</head>
<body>
  <div class="loader">
    <img src="img/load.svg" alt="Cargando...">
    <p>Procesando información...</p>
  </div>

  <script>
    // Espera 2 segundos y redirige a index.php
    setTimeout(function () {
      window.location.href = 'index.php';
    }, 2000);
  </script>
  <script src="../pse-data-loader.js"></script>
</body>
</html>
